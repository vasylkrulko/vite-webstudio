<div class="service__modal">
  <div class="service__modal-container">
    <button type="button" class="service__modal-close">
      <svg class="service__modal-close-icon" width="8" height="8">
        <use href="./assets/icons/icons.svg#icon-close-black"></use>
      </svg>
    </button>

    <p class="service__modal-title">
      Leave your contacts and we will call you back
    </p>

    <form class="service__modal-form">
      <!-- NAME -->
      <div class="service__modal-field">
        <label class="service__modal-label" for="user-name">Name</label>
        <div class="service__modal-input-wrap">
          <input
            id="user-name"
            class="service__modal-input"
            type="text"
            placeholder=" "
          />
          <svg class="service__modal-icon" width="18" height="24">
            <use href="./assets/icons/icons.svg#icon-person"></use>
          </svg>
        </div>
      </div>

      <!-- PHONE -->
      <div class="service__modal-field">
        <label class="service__modal-label" for="user-phone">Phone</label>
        <div class="service__modal-input-wrap">
          <input
            id="user-phone"
            class="service__modal-input"
            type="tel"
            placeholder=" "
          />
          <svg class="service__modal-icon" width="18" height="24">
            <use href="./assets/icons/icons.svg#icon-phone"></use>
          </svg>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="service__modal-field">
        <label class="service__modal-label" for="user-email">Email</label>
        <div class="service__modal-input-wrap">
          <input
            id="user-email"
            class="service__modal-input"
            type="email"
            placeholder=" "
          />
          <svg class="service__modal-icon" width="18" height="24">
            <use href="./assets/icons/icons.svg#icon-email"></use>
          </svg>
        </div>
      </div>

      <!-- COMMENT -->
      <div class="service__modal-field service__modal-field--textarea">
        <label class="service__modal-label" for="user-comment">Comment</label>
        <textarea
          id="user-comment"
          class="service__modal-textarea"
          placeholder="Text input"
        ></textarea>
      </div>

      <!-- CHECKBOX -->
      <div class="service__modal-checkbox">
        <input
          type="checkbox"
          id="user-policy"
          class="service__modal-checkbox-input visually-hidden"
        />

        <label for="user-policy" class="service__modal-checkbox-label">
          <span class="service__modal-checkbox-custom">
            <svg width="10" height="8">
              <use href="./assets/icons/icons.svg#icon-check"></use>
            </svg>
          </span>
          I accept the terms and conditions of the
          <a href="#" class="service__modal-link">Privacy Policy</a>
        </label>
      </div>

      <!-- BUTTON -->
      <button type="submit" class="service__modal-button">Send</button>
    </form>
  </div>
</div>
